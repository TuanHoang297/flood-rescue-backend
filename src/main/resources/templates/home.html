<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-card {
            background: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .avatar {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h2 {
            color: #333;
            font-size: 26px;
            margin-bottom: 10px;
        }
        .welcome-text {
            color: #555;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .welcome-text span {
            color: #667eea;
            font-weight: bold;
        }
        .success-msg {
            background: #e6ffed;
            color: #1e7e34;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-change-password {
            display: inline-block;
            padding: 12px 22px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-change-password:hover { background: #2c81ba; }
        .btn-logout {
            display: inline-block;
            padding: 12px 32px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="home-card">
        <div class="avatar">&#128075;</div>
        <h2>Chao mung!</h2>
        <p class="welcome-text">
            Ban da dang nhap thanh cong voi tai khoan: <span th:text="${username}"></span>
        </p>
        <div class="success-msg" th:if="${success}" th:text="${success}"></div>
        <div class="actions">
            <a href="/change-password" class="btn-change-password">Doi Mat Khau</a>
            <a href="/logout" class="btn-logout">&#128682; Dang Xuat</a>
        </div>
    </div>
</body>
</html>
