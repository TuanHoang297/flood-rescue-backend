<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doi Mat Khau</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #3c8ce7 0%, #00eaff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 36px;
        }
        h2 {
            text-align: center;
            margin-bottom: 22px;
            color: #1f2d3d;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 6px;
        }
        input[type="password"] {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d8dee9;
            border-radius: 6px;
            font-size: 15px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #3c8ce7;
        }
        .error-msg {
            background: #ffe0e0;
            color: #c0392b;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            padding: 11px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        .btn-submit {
            background: #2ecc71;
            color: white;
        }
        .btn-submit:hover { background: #27ae60; }
        .btn-back {
            background: #7f8c8d;
            color: white;
        }
        .btn-back:hover { background: #626e70; }
        .hint {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Doi Mat Khau</h2>
        <div class="error-msg" th:if="${error}" th:text="${error}"></div>
        <form method="post" action="/change-password">
            <div class="form-group">
                <label for="oldPassword">Mat khau hien tai</label>
                <input id="oldPassword" name="oldPassword" type="password" required>
            </div>
            <div class="form-group">
                <label for="newPassword">Mat khau moi</label>
                <input id="newPassword" name="newPassword" type="password" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Xac nhan mat khau moi</label>
                <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>
            </div>
            <div class="actions">
                <button class="btn btn-submit" type="submit">Cap Nhat</button>
                <a class="btn btn-back" href="/home">Quay Lai</a>
            </div>
            <p class="hint">Mat khau moi phai co it nhat 6 ky tu.</p>
        </form>
    </div>
</body>
</html>
